aid: b2find-eudat-eu
name: EUDAT B2FIND
description: >-
  EUDAT B2FIND is a organization open-data portal for European Union running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 1,466,694 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: organization
