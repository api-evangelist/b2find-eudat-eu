apis:
  - aid: b2find-eudat-eu:catalog
    name: EUDAT B2FIND CKAN Action API
    description: >-
      CKAN Action API for EUDAT B2FIND, a consistent JSON-over-HTTP interface over a catalog of 1,466,694 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://b2find.eudat.eu/api/3/action/.
    humanURL: https://b2find.eudat.eu
    baseURL: https://b2find.eudat.eu/api/3/action
